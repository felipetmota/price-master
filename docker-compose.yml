# ---------------------------------------------------------------------
# Price Management — API stack for Portainer.
#
# Storage: SQLite (better-sqlite3) — the database lives in the
# `price_data` named volume mounted at /data inside the container.
# To migrate to Postgres later you only need to swap the driver in
# server/src/db.js; the API surface stays the same.
#
# Assumes you ALREADY have:
#   - Traefik handling routing + TLS
#   - The frontend `dist/` served by your existing nginx
#
# How to deploy in Portainer:
#   1. Stacks → Add stack → "Web editor"
#   2. Paste this file
#   3. Fill in environment variables (Portainer shows them automatically):
#        - API_HOST     (e.g. price-api.intranet.local)
#        - CORS_ORIGIN  (e.g. https://prices.intranet.local)
#   4. Deploy. Traefik will pick up the labels automatically.
#   5. (Once) seed the default admin/user accounts:
#        docker exec -it price-management-api node scripts/hash-passwords.js
# ---------------------------------------------------------------------
services:
  api:
    build:
      context: ./server
    image: price-management-api:latest
    container_name: price-management-api
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/prices.db
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - price_data:/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.price-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.price-api.entrypoints=websecure"
      - "traefik.http.routers.price-api.tls=true"
      # If you use Let's Encrypt with a resolver named "le", uncomment:
      # - "traefik.http.routers.price-api.tls.certresolver=le"
      - "traefik.http.services.price-api.loadbalancer.server.port=3001"

volumes:
  price_data:
    # Persistent SQLite storage. Backup with:
    #   docker run --rm -v price_data:/data -v $PWD:/backup alpine \
    #     tar czf /backup/prices-$(date +%F).tgz -C /data .

networks:
  traefik:
    # Set `external: true` if your Traefik network is managed outside this stack.
    external: true
    name: traefik